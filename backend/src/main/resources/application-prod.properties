# н”„лЎңлҚ•м…ҳ нҷҳкІҪ м„Өм • вҖ” SPRING_PROFILES_ACTIVE=prod лЎң нҷңм„ұнҷ”
# H2 + DataInitializerлҠ” @Profile("!prod") лЎң мһҗлҸҷ л№„нҷңм„ұнҷ”лҗЁ

# м„ңлІ„ (м»Ён…Ңмқҙл„Ҳ н‘ңмӨҖ 8080)
server.port=8080

# лҚ°мқҙн„°лІ мқҙмҠӨ (Railway / Render PostgreSQL)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# H2 мҪҳмҶ” л№„нҷңм„ұнҷ”
spring.h2.console.enabled=false

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400}

# лЎңк№…
logging.level.root=INFO
logging.level.com.happiness=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN

# Actuator (н—¬мҠӨмІҙнҒ¬мҡ©, мқёмҰқ л¶Ҳн•„мҡ”)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
